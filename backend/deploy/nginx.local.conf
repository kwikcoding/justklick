# Local development NGINX configuration for justklick
# Django API server (Gunicorn on port 8000)
upstream django_app {
    server 127.0.0.1:8000;
}

server {
    listen 8080;
    server_name localhost;

    # Access and error logs
    access_log /usr/local/var/log/nginx/localhost.access.log;
    error_log /usr/local/var/log/nginx/localhost.error.log;

    # Proxy to Django/Gunicorn
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Serve static files
    location /static/ {
        alias /Users/arcotindia/Desktop/Python_Practise/justklick/backend/staticfiles/;
    }

    # Serve media files
    location /media/ {
        alias /Users/arcotindia/Desktop/Python_Practise/justklick/backend/media/;
    }
}
